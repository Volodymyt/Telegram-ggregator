services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    command: ["python", "-m", "telegram_aggregator"]
    restart: "no"
    env_file:
      - .env
    environment:
      TG_SESSION_PATH: /var/app/sessions/default.session
    volumes:
      - ./:/var/app
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:latest
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - postgres_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
